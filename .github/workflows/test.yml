name:  Licenta Test workflow
on: workflow_dispatch
jobs:
    ec2-deploy:
        name: EC2 Instance deployment
        runs-on: [self-hosted, X64, Linux, runner-vm]
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Terraform init
              working-directory: ./terraform
              run: terraform init -input=false

            - name: Terraform plan
              working-directory: ./terraform
              run: terraform plan -input=false -no-color -parallelism=1

            - name: Terraform apply
              working-directory: ./terraform
              run: |
               terraform apply -input=false -auto-approve -parallelism=1

            - name: Docker build and push
              run: |
               docker build -t andreir76/licenta-test .
               docker push andreir76/licenta-test

            - name: Connect to AppVM and run the app container
              working-directory: /home/ubuntu/key
              run: |
               ssh -i test_key.pem ubuntu@192.168.191.116
               docker stop test-app-container || true
               docker rm test-app-container || true
               docker pull andreir76/licenta-test
               docker run -d -p 80:8080 --name test-app-container --restart unless-stopped andreir76/licenta-test