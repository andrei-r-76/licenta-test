apiVersion: apps/v1
kind: Deployment
metadata:
 name: minikube-test-deployment
spec:
 replicas: 2
 selector:
  matchLabels:
   app: licenta-test-app
 template:
  metadata:
   name: licenta-test-pod
   labels:
    app: licenta-test-app
  spec:
   containers:
    - name: licenta-test-container
      image: andreir76/licenta-test
